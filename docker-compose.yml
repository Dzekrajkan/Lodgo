version: "3.9"

services: 

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/app
      REDIS_URL: redis://redis:6379/0
    expose:
      - "8000"
    volumes:
      - ./backend:/app/backend

  celery_worker:
    build: ./backend
    command: celery -A backend.celery_app:celery worker --loglevel=info
    depends_on:
      - backend
      - redis
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://user:password@postgres:5432/app

  celery_beat:
    build: ./backend
    command: celery -A backend.celery_app.celery beat -l info
    depends_on:
      - backend
      - redis

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

volumes:
  postgres_data: